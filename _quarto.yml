project:
  type: book
  output-dir: docs

lang: es

book:
  title: "Aprendizaje y Clasificación Automática con R"
  subtitle: "Un enfoque práctico con datos abiertos reales"
  author: "MI. Gilberto Rodríguez"
  date: today
  downloads: [pdf]
  chapters:
    - index.qmd
    - 01-introduccion.qmd
    - 02-preparacion-datos.qmd
    - 03-analisis-exploratorio.qmd
    - 04-regresion-logistica.qmd
    - 05-knn.qmd

execute:
  echo: true
  warning: false
  message: false
  freeze: auto
  fig_crop: false

format:
  html:
    theme: cosmo
    toc: true
    number-sections: true
    code-fold: true
    code-tools: true
    html-math-method: mathjax

  pdf:
    documentclass: book
    output-file: Aprendizaje-y-Clasificación-Automática-con-R.pdf
    toc: true
    toc-title: "Índice general"
    number-sections: true
    colorlinks: true
    geometry:
      - margin=2.5cm
    fontsize: 11pt
    keep-tex: true
    pdf-engine: lualatex
    include-in-header:
      text: |
        \renewcommand{\contentsname}{Índice general}
        \renewcommand{\chaptername}{Capítulo}
