project:
  type: book
  output-dir: docs

lang: es

book:
  title: "Aprendizaje y Clasificación Automática con R"
  subtitle: "Un enfoque práctico con datos abiertos reales"
  author: "MI Jesús Gilberto Rodríguez Escobedo"
  date: today
  downloads: [pdf]
  chapters:
    - index.qmd
    - 00-licencia-y-citacion.qmd
    - 01-introduccion.qmd
    - 02-preparacion-datos.qmd
    - 03-analisis-exploratorio.qmd
    - 04-regresion-logistica.qmd
    - 05-knn.qmd
    - 06-arboles-decision.qmd
  page-footer:
    left: "Aprendizaje y Clasificación Automática con R"
    right: "MI Jesús Gilberto Rodríguez Escobedo"

execute:
  echo: true
  warning: false
  message: false
  freeze: auto
  fig_crop: false

format:
  html:
    theme: cosmo
    css: styles.css
    toc: true
    number-sections: true
    code-fold: true
    code-tools: true
    html-math-method: mathjax

  pdf:
    documentclass: book
    toc: true
    toc-title: "Índice general"
    number-sections: true
    colorlinks: true
    geometry:
      - margin=2.5cm
    fontsize: 11pt
    keep-tex: true
    pdf-engine: lualatex
    include-in-header:
      text: |
        \renewcommand{\contentsname}{Índice general}
        \renewcommand{\chaptername}{Capítulo}
        \usepackage{xcolor}
        \definecolor{azulLibro}{HTML}{0B3D91}
        \definecolor{turquesaLibro}{HTML}{00A6A6}
        \usepackage{titlesec}
        \titleformat{\chapter}[display]
          {\normalfont\huge\bfseries\color{azulLibro}}
          {\chaptertitlename\ \thechapter}{20pt}{\Huge}
        \titleformat{\section}
          {\normalfont\Large\bfseries\color{azulLibro}}
          {\thesection}{1em}{}
        \titleformat{\subsection}
          {\normalfont\large\bfseries\color{turquesaLibro}}
          {\thesubsection}{1em}{}
