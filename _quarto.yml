project:
  type: book
  output-dir: docs

lang: es

book:
  title: "Aprendizaje y Clasificación Automática con R"
  subtitle: "Un enfoque práctico con datos abiertos reales"
  author: "MI Jesús Gilberto Rodríguez Escobedo"
  date: today
  downloads: [pdf]
  chapters:
    - index.qmd
    - 00-licencia-y-citacion.qmd
    - 01-introduccion.qmd
    - 02-preparacion-datos.qmd
    - 03-analisis-exploratorio.qmd
    - 04-regresion-logistica.qmd
    - 05-knn.qmd
    - 06-arboles-decision.qmd
    - 07-random-forest.qmd

execute:
  echo: true
  warning: false
  message: false
  freeze: auto
  fig_crop: false

knitr:
  opts_chunk:
    dev: "png"
    dpi: 150
    fig.width: 7
    fig.height: 4.5
    out.width: "92%"

format:
  html:
    theme: cosmo
    css: styles.css
    toc: true
    number-sections: true
    code-fold: true
    code-tools: false
    html-math-method: mathjax

  pdf:
    documentclass: book
    pdf-engine: lualatex
    toc: true
    toc-title: "Índice general"
    number-sections: true
    colorlinks: true
    fontsize: 11pt
    geometry:
      - margin=2.3cm
    keep-tex: true
    code-overflow: wrap
    highlight-style: github
    include-in-header:
      text: |
        \usepackage{xcolor}
        \usepackage{fvextra}
        \usepackage{tcolorbox}
        \usepackage{titlesec}
        \usepackage{fontspec}
        \definecolor{azulLibro}{HTML}{1F4E79}
        \definecolor{turquesaLibro}{HTML}{19A7AE}
        \definecolor{grisCodigo}{HTML}{F3F6FA}
        \definecolor{bordeCodigo}{HTML}{B7C7D9}
        \definecolor{coralLibro}{HTML}{D95D39}
        \fvset{breaklines=true,breakanywhere=true,fontsize=\scriptsize,frame=single,framesep=2mm,rulecolor=\color{bordeCodigo},baselinestretch=1.02}
        \titleformat{\chapter}[display]
          {\normalfont\Huge\bfseries\color{azulLibro}}
          {\chaptertitlename\ \thechapter}{12pt}{\Huge}
        \titleformat{\section}
          {\normalfont\Large\bfseries\color{azulLibro}}
          {\thesection}{0.8em}{}
        \titleformat{\subsection}
          {\normalfont\large\bfseries\color{turquesaLibro}}
          {\thesubsection}{0.8em}{}
        \renewcommand{\contentsname}{Índice general}
        \renewcommand{\chaptername}{Capítulo}
