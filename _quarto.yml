project:
  type: book
  output-dir: docs

lang: es

book:
  title: "Aprendizaje y Clasificación Automática con R"
  subtitle: "Un enfoque práctico con datos abiertos reales"
  author: "MI Jesús Gilberto Rodríguez Escobedo"
  date: today
  downloads: [pdf]
  chapters:
    - index.qmd
    - 00-licencia-y-citacion.qmd
    - 01-introduccion.qmd
    - 02-preparacion-datos.qmd
    - 03-analisis-exploratorio.qmd
    - 04-regresion-logistica.qmd
    - 05-knn.qmd
    - 06-arboles-decision.qmd
    - 07-random-forest.qmd

execute:
  echo: true
  warning: false
  message: false
  freeze: auto
  fig_crop: false

knitr:
  opts_chunk:
    dev: "png"
    dpi: 150
    fig.width: 7
    fig.height: 4.5

format:
  html:
    theme: cosmo
    css: styles.css
    toc: true
    number-sections: true
    code-fold: true
    code-tools: false
    html-math-method: mathjax

  pdf:
    documentclass: book
    pdf-engine: lualatex
    toc: true
    toc-title: "Índice general"
    number-sections: true
    colorlinks: true
    geometry:
      - margin=2.5cm
    fontsize: 11pt
    keep-tex: true
    code-block-bg: "#F3F7FA"
    code-block-border-left: "#0B4F6C"
    include-in-header:
      text: |
        \usepackage{xcolor}
        \usepackage{titlesec}
        \definecolor{AzulLibro}{HTML}{0B4F6C}
        \definecolor{TurquesaLibro}{HTML}{0EA5A8}
        \definecolor{GrisTexto}{HTML}{374151}
        \renewcommand{\contentsname}{Índice general}
        \renewcommand{\chaptername}{Capítulo}
        \titleformat{\chapter}[display]
          {\normalfont\huge\bfseries\color{AzulLibro}}
          {\chaptername\ \thechapter}{16pt}{\Huge}
        \titleformat{\section}
          {\normalfont\Large\bfseries\color{AzulLibro}}
          {\thesection}{1em}{}
        \titleformat{\subsection}
          {\normalfont\large\bfseries\color{TurquesaLibro}}
          {\thesubsection}{1em}{}
