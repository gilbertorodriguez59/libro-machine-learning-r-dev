project:
  type: book
  output-dir: docs
  resources:
    - Aprendizaje_y_Clasificacion_Automatica_con_R_Colab.ipynb

lang: es
bibliography: referencias.bib

book:
  title: "Aprendizaje y Clasificación Automática con R"
  subtitle: "Un enfoque práctico con datos abiertos reales"
  author: "MI Jesús Gilberto Rodríguez Escobedo"
  date: today
  downloads: [pdf]
  chapters:
    - index.qmd
    - 00-licencia-y-citacion.qmd
    - 00-cuaderno-google-colab.qmd
    - 01-introduccion.qmd
    - 02-preparacion-datos.qmd
    - 03-analisis-exploratorio.qmd
    - 04-regresion-logistica.qmd
    - 05-knn.qmd
    - 06-arboles-decision.qmd
    - 07-random-forest.qmd
    - 08-evaluacion-modelos.qmd
    - 09-svm.qmd
    - 10-naive-bayes.qmd
  appendices:
    - referencias.qmd

execute:
  echo: true
  warning: false
  message: false
  freeze: auto
  fig_crop: false

knitr:
  opts_chunk:
    dev: "png"
    dpi: 150
    fig.width: 7
    fig.height: 4.5
    out.width: "92%"

format:
  html:
    theme: cosmo
    css: styles.css
    toc: true
    number-sections: true
    code-fold: true
    code-tools: false
    html-math-method: mathjax

  pdf:
    documentclass: scrbook
    classoption:
      - openany
      - headings=big
    pdf-engine: lualatex
    toc: true
    toc-title: "Índice general"
    number-sections: true
    colorlinks: true
    linkcolor: blue
    urlcolor: blue
    citecolor: blue
    fontsize: 10.5pt
    papersize: letter
    geometry:
      - top=2.35cm
      - bottom=2.35cm
      - inner=2.75cm
      - outer=2.25cm
      - headsep=0.65cm
    keep-tex: true
    code-overflow: wrap
    highlight-style: github
    fig-pos: "H"
    tbl-pos: "H"
    include-in-header:
      - latex/configuracion-pdf.tex
