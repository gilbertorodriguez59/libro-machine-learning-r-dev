# Perfil PDF profesional.
# Uso: quarto render --profile pdf --to pdf
# Conserva el código visible y suprime mensajes y advertencias innecesarios.
execute:
  echo: true
  warning: false
  message: false
  freeze: auto
  fig_crop: false

knitr:
  opts_chunk:
    dev: "png"
    dpi: 180
    fig.width: 7
    fig.height: 4.5
    out.width: "92%"
    collapse: false
    comment: "#>"

format:
  pdf:
    include-in-header:
      - latex/configuracion-pdf.tex
      - latex/portada-pdf.tex
